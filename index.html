<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de Localisation en Temps Réel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        
        #map {
            height: 100vh;
            width: 100%;
        }
        
        #info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }
        
        .latest-point {
            color: red;
            font-weight: bold;
        }
        
        .speed-info {
            margin-top: 10px;
        }
        
        .panel-title {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .location-emoji {
            font-size: 1.5em;
            vertical-align: middle;
            margin-left: 5px;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="info-panel">
        <h3 class="panel-title">Informations en temps réel</h3>
        <div id="latest-location" class="latest-point">
            Position actuelle: Chargement...
        </div>
        <div id="speed-info" class="speed-info">
            Vitesse: Chargement...
        </div>
    </div>

    <!-- Inclure l'API Google Maps (remplacez YOUR_API_KEY par votre clé API) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

    <script>
        // Variables globales
        let map;
        let markers = [];
        let currentLocationMarker = null;
        let trackingEnabled = true;

        // Initialisation de la carte
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: {
                    lat: 48.856614,
                    lng: 2.3522219
                }, // Paris par défaut
                zoom: 15,
                mapTypeId: 'roadmap',
                mapTypeControl: true,
                fullscreenControl: true,
                streetViewControl: true,
                zoomControl: true
            });

            // Charger les points initiaux
            fetchAndDisplayPoints();

            // Configurer l'actualisation automatique
            setInterval(fetchLatestPoint, 5000); // Actualiser uniquement le dernier point toutes les 5 secondes

            // Actualiser tous les points moins souvent (pour économiser les ressources)
            setInterval(fetchAndDisplayPoints, 30000); // Actualiser tous les points toutes les 30 secondes
        }

        // Fonction pour récupérer et afficher tous les points
        function fetchAndDisplayPoints() {
            fetch('/get_all_points')
                .then(response => response.json())
                .then(data => {
                    // Effacer tous les marqueurs existants (sauf la position actuelle)
                    clearAllMarkers();

                    // Variable pour stocker la position actuelle (s'il y en a une)
                    let latestPoint = null;

                    // Parcourir tous les points reçus
                    data.points.forEach(point => {
                        const position = {
                            lat: point.latitude,
                            lng: point.longitude
                        };

                        // Si c'est le dernier point, enregistrer pour traitement séparé
                        if (point.is_latest) {
                            latestPoint = point;
                        } else {
                            // Marqueur standard pour les autres points
                            const marker = new google.maps.Marker({
                                position: position,
                                map: map,
                                icon: {
                                    path: google.maps.SymbolPath.CIRCLE,
                                    scale: 5,
                                    fillColor: "#FF0000",
                                    fillOpacity: 0.5,
                                    strokeColor: "#FFFFFF",
                                    strokeWeight: 1,
                                },
                                title: `Point - Vitesse: ${point.speed} m/s`
                            });

                            markers.push(marker);
                        }
                    });

                    // Traiter le dernier point séparément (s'il existe)
                    if (latestPoint) {
                        updateLatestPointDisplay(latestPoint);
                    }
                })
                .catch(error => {
                    console.error('Erreur lors de la récupération des points:', error);
                });
        }

        // Fonction pour récupérer uniquement le dernier point
        function fetchLatestPoint() {
            fetch('/get_latest_point')
                .then(response => response.json())
                .then(data => {
                    if (data.latest_point) {
                        const point = data.latest_point;
                        updateLatestPointDisplay(point);
                    }
                })
                .catch(error => {
                    console.error('Erreur lors de la récupération du dernier point:', error);
                });
        }

        // Mettre à jour l'affichage du dernier point
        function updateLatestPointDisplay(point) {
            const position = {
                lat: point.latitude,
                lng: point.longitude
            };

            // Mettre à jour ou créer le marqueur de position actuelle
            if (currentLocationMarker) {
                currentLocationMarker.setPosition(position);
            } else {
                currentLocationMarker = new google.maps.Marker({
                    position: position,
                    map: map,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 10,
                        fillColor: "#4285F4",
                        fillOpacity: 1,
                        strokeColor: "#FFFFFF",
                        strokeWeight: 2,
                    },
                    animation: google.maps.Animation.BOUNCE,
                    title: `Position actuelle - Vitesse: ${point.speed} m/s`
                });
            }

            // Si le suivi est activé, centrer la carte sur la position actuelle
            if (trackingEnabled) {
                map.panTo(position);
            }

            // Mettre à jour le panneau d'informations
            document.getElementById('latest-location').innerHTML =
                `Position actuelle: ${point.latitude.toFixed(6)}, ${point.longitude.toFixed(6)}
                 <span class="location-emoji">📍</span>`;
            document.getElementById('speed-info').innerHTML =
                `Vitesse: ${point.speed.toFixed(2)} m/s`;
        }

        // Fonction pour effacer tous les marqueurs (sauf la position actuelle)
        function clearAllMarkers() {
            markers.forEach(marker => {
                marker.setMap(null);
            });
            markers = [];
        }
    </script>
</body>

</html>
